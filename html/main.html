<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie UI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #141414;
      color: white;
      font-family: Arial, sans-serif;
    }

    .navbar {
      background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
    }

    .navbar-brand {
      color: red !important;
      font-weight: bold;
      font-size: 24px;
    }

    .hero {
      height: 80vh;
      background: url('https://image.tmdb.org/t/p/original/9yBVqNruk6Ykrwc32qrK2TIE5xw.jpg') center/cover no-repeat;
      display: flex;
      align-items: center;
      padding: 50px;
      position: relative;
    }

    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, rgba(0,0,0,0.8), transparent);
    }

    .hero-content {
      position: relative;
      max-width: 500px;
    }

    .btn-custom {
      margin-right: 10px;
    }

    .movie-row {
      padding: 20px;
    }

    .movie-card {
      transition: transform 0.3s;
      cursor: pointer;
    }

    .movie-card:hover {
      transform: scale(1.1);
      z-index: 2;
    }

    .movie-card img {
      border-radius: 10px;
      width: 100%;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">NETFLIX</a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-3">
        <li class="nav-item"><a class="nav-link text-white" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="#">Movies</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="#">TV Shows</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="#">My List</a></li>
      </ul>
    </div>
  </div>
</nav>

<section class="hero">
  <div class="hero-content">
    <h1>Bon Appétit: Your Majesty</h1>
    <p>Một đầu bếp hiện đại xuyên không gặp bạo chúa...</p>
    <button class="btn btn-light btn-custom">▶ Play</button>
    <button class="btn btn-secondary">More Info</button>
  </div>
</section>

<section class="movie-row">
  <h4>Popular Movies</h4>
  <div class="row">
    <div class="col-6 col-md-3 col-lg-2 movie-card">
      <img src="https://image.tmdb.org/t/p/w500/q6y0Go1tsGEsmtFryDOJo3dEmqu.jpg">
    </div>
    <div class="col-6 col-md-3 col-lg-2 movie-card">
      <img src="https://image.tmdb.org/t/p/w500/8UlWHLMpgZm9bx6QYh0NFoq67TZ.jpg">
    </div>
    <div class="col-6 col-md-3 col-lg-2 movie-card">
      <img src="https://image.tmdb.org/t/p/w500/7WsyChQLEftFiDOVTGkv3hFpyyt.jpg">
    </div>
    <div class="col-6 col-md-3 col-lg-2 movie-card">
      <img src="https://image.tmdb.org/t/p/w500/xBHvZcjRiWyobQ9kxBhO6B2dtRI.jpg">
    </div>
    <div class="col-6 col-md-3 col-lg-2 movie-card">
      <img src="https://image.tmdb.org/t/p/w500/6KErczPBROQty7QoIsaa6wJYXZi.jpg">
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
