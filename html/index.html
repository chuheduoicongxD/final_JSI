<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie UI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <style>
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-black fixed-top px-4">
  <div class="container-fluid">

    <!-- Logo -->
    <a class="navbar-brand text-danger fw-bold" href="#">NETFLIX</a>

    <!-- Toggle mobile -->
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Menu -->
    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav me-auto ms-3">
        <li class="nav-item"><a class="nav-link text-white" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="#">Movies</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="#">TV Shows</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="#">My List</a></li>
      </ul>

      <!-- Search -->
      <form id="searchForm" class="d-flex me-3">
        <input id="searchInput" class="form-control me-2" type="search" placeholder="Search movies...">
        <button class="btn btn-outline-light" type="submit">Search</button>
      </form>

      <!-- Logout -->
      <button onclick="doLogout()" class="btn btn-danger">Logout</button>
    </div>

  </div>
</nav>

<!-- Danh sách phim -->
<div id="movieList" class="container mt-5 pt-5 d-flex flex-wrap gap-4 justify-content-center"></div>

<section class="hero">
  <div class="hero-content">
    <h1>Bon Appétit: Your Majesty</h1>
    <p>Một đầu bếp hiện đại xuyên không gặp bạo chúa...</p>
    <button class="btn btn-light btn-custom">▶ Play</button>
    <button class="btn btn-secondary">More Info</button>
  </div>
</section>

<section class="movie-row">
  <h4>Popular Movies</h4>
  <div class="row">
    <div class="col-6 col-md-3 col-lg-2 movie-card">
      <img src="https://image.tmdb.org/t/p/w500/q6y0Go1tsGEsmtFryDOJo3dEmqu.jpg">
    </div>
    <div class="col-6 col-md-3 col-lg-2 movie-card">
      <img src="https://image.tmdb.org/t/p/w500/8UlWHLMpgZm9bx6QYh0NFoq67TZ.jpg">
    </div>
    <div class="col-6 col-md-3 col-lg-2 movie-card">
      <img src="https://image.tmdb.org/t/p/w500/7WsyChQLEftFiDOVTGkv3hFpyyt.jpg">
    </div>
    <div class="col-6 col-md-3 col-lg-2 movie-card">
      <img src="https://image.tmdb.org/t/p/w500/xBHvZcjRiWyobQ9kxBhO6B2dtRI.jpg">
    </div>
    <div class="col-6 col-md-3 col-lg-2 movie-card">
      <img src="https://image.tmdb.org/t/p/w500/6KErczPBROQty7QoIsaa6wJYXZi.jpg">
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script src="/js/config.js"></script>
<script src="/js/auth.js"></script>
<script src="/js/movie.js"></script>
<script>
// kiểm tra đăng nhập
checkAuth(function(user){
    if(!user){
        alert("Bạn chưa đăng nhập!");
        window.location.href = "login.html";
    } else {
        console.log("User:", user.email);
    }
});

// logout
function doLogout(){
    logout().then(function(){
        alert("Đăng xuất thành công!");
        window.location.href = "login.html";
    });
}

</script>
</body>
</html>
